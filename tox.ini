[tox]
# Python 3.8 is the minimum (aligns with requires-python).
# Python 3.14 is included to catch forward-compat issues early.
envlist = py38, py39, py310, py311, py312, py313, py314
requires =
    tox-uv>=1

[testenv]
extras = test
deps =
    -e {toxinidir}/submodules/asr-api-python
set_env = PYTHONPATH = {toxinidir}
passenv =
    ASR_*
commands =
    pytest --basetemp={envtmpdir} \
           --cov=asr_client \
           --cov-report=term-missing \
           --cov-report=xml:{envtmpdir}/coverage.xml \
           {posargs}
